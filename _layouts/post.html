---
layout: default
---
<main class="container post">
  <article>
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.categories %}<p class="post-meta">{{ page.categories | join: ", " }}</p>{% endif %}
    <div class="entry">{{ content }}</div>
  </article>
  <p class="back-link"><a href="{{ '/blog/' | relative_url }}">&larr; Back to blog</a></p>
</main>

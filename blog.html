---
layout: default
title: Blog
permalink: /blog/
---
<main class="container blog-list">
  {% for post in site.posts %}
  <article class="post-summary">
    <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
    {% if post.categories %}<p class="post-meta">{{ post.categories | join: ", " }}</p>{% endif %}
    <p>{{ post.excerpt | strip_html | strip_newlines | truncatewords: 55 }}</p>
    <p><a href="{{ post.url | relative_url }}">Read more &rarr;</a></p>
  </article>
  {% endfor %}
</main>
